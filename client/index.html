    <!-- Structured Data: FAQ (etusivun UKK) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Paljonko kirjan julkaiseminen maksaa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Thunder Kustannuksen paketit alkavat 890 eurosta (Digi-paketti, sis. ALV 25,5 %). Printti-paketti on 1 690 € ja Premium-paketti 2 990 €. Kaikki hinnat sisältävät taiton, kansisuunnittelun, ISBN-tunnuksen ja jakelun."
          }
        },
        {
          "@type": "Question",
          "name": "Kuinka kauan kirjan julkaiseminen kestää?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kun käsikirjoitus on valmis, julkaisuprosessi kestää tyypillisesti 4–8 viikkoa. Tämä sisältää taiton, kansisuunnittelun, ISBN-rekisteröinnin ja jakelun."
          }
        },
        {
          "@type": "Question",
          "name": "Mihin kanaviin kirja jaellaan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Printti-paketti kattaa jakelun kaikkiin tärkeimpiin kanaviin: Suomalainen Kirjakauppa, Adlibris, Kirjastot, Storytel, BookBeat, Nextory, Spotify, Amazon, Elisa Kirja, Kobo ja Google Play Books."
          }
        },
        {
          "@type": "Question",
          "name": "Säilytänkö tekijänoikeudet kirjaani?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kyllä. Tekijänoikeudet pysyvät aina sinulla. Thunder Kustannus toimii palvelukustantamona — me hoidamme julkaisuprosessin, mutta kirja on sinun."
          }
        },
        {
          "@type": "Question",
          "name": "Voinko julkaista sekä painetun kirjan että äänikirjan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kyllä. Printti-paketti sisältää painetun kirjan, e-kirjan ja äänikirjan. Digi-paketti sisältää e-kirjan ja äänikirjan ilman painettua kirjaa."
          }
        }
      ]
    }
    </script>
